<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PDF OCR Studio - PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📄 PDF OCR Studio</h1>
    <p>Sube un PDF (imagen escaneada o texto) y obtén OCR + descarga</p>
    
    <div class="upload-area" id="uploadArea">
      <input type="file" id="pdfInput" accept="application/pdf" />
      <label for="pdfInput" class="btn">📁 Seleccionar PDF</label>
      <p id="fileName"></p>
    </div>

    <div class="progress-container hidden" id="progressContainer">
      <progress id="ocrProgress" value="0" max="100"></progress>
      <span id="progressText">0%</span>
    </div>

    <div class="actions hidden" id="actions">
      <button id="downloadBtn" class="btn success">⬇️ Descargar PDF con OCR</button>
      <button id="resetBtn" class="btn">🔄 Nuevo archivo</button>
    </div>

    <div id="preview" class="preview"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
